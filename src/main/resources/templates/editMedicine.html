<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Insert title here</title>
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
	<header th:replace="~{header}"></header>
	<h1>服薬データ更新</h1>

	<form th:action="@{/medicine/{medicineId}/edit(medicineId=${medicine.id})}" method="post">
		<table border="1">
			<tr>
				<th>No</th>
				<th>薬剤名</th>
				<th>個数</th>
				<th>備考欄</th>
				<th>朝</th>
				<th>昼</th>
				<th>晩</th>
			</tr>
			<tr>
				<td th:text="${medicine.id}"></td>
				<td>
					<input type="text" name="name" th:value="${medicine.name}" class="textbox-1" >
				</td>
				<td>
					<input type="text" name="count" th:value="${medicine.count}" class="textbox-1">
				</td>
				<td>
					<input type="text" name="note" th:value="${medicine.note}" class="textbox-1">
				</td>
				<td>
					<input type="checkbox" name="morning"  value="true" th:checked="${medicine.morning}">
				</td>
				<td>
					<input type="checkbox" name="daytime" value="true" th:checked="${medicine.daytime}">
				</td>
				<td>
					<input type="checkbox" name="night" value="true" th:checked="${medicine.night}">
				</td>
			</tr>
		</table>
		<button class="addMbut">更新</button>
	</form>
</body>

</html>
